<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact Us - Coach Gym</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <h1>Coach Gym</h1>
      <nav>
        <a href="index.html">Home</a>
        <a href="contact.html">Contact Us</a>
      </nav>
    </div>
  </header>

  <main class="container page-section">
    <h2>Contact Us</h2>
    <p>Fill out the form and the owner will receive your request in Google Sheets.</p>

    <form id="contactForm" class="contact-form">
      <div class="form-group">
        <label for="fullName">Full Name</label>
        <input id="fullName" name="fullName" type="text" required />
      </div>

      <div class="form-group">
        <label for="phone">Phone</label>
        <input id="phone" name="phone" type="text" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required />
      </div>

      <div class="form-group">
        <label for="goal">Goal</label>
        <select id="goal" name="goal" required>
          <option value="">Select a goal</option>
          <option value="Weight Loss">Weight Loss</option>
          <option value="Muscle Gain">Muscle Gain</option>
          <option value="General Fitness">General Fitness</option>
          <option value="Other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label for="preferredTime">Preferred Time</label>
        <input id="preferredTime" name="preferredTime" type="text" placeholder="Morning / Evening" />
      </div>

      <div class="form-group">
        <label for="message">Message</label>
        <textarea id="message" name="message" rows="5"></textarea>
      </div>

      <button type="submit" class="btn">Send</button>
      <p id="formStatus" class="status-text"></p>
    </form>
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>© 2026 Coach Gym. All rights reserved.</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
